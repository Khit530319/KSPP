version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: freshcut_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       freshcut_erp
      POSTGRES_USER:     freshcut
      POSTGRES_PASSWORD: ${DB_PASSWORD:-FreshCut@2568}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U freshcut -d freshcut_erp"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (sessions / cache / WS pub-sub) ───────────────────
  redis:
    image: redis:7-alpine
    container_name: freshcut_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-Redis@2568}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── Backend API ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: freshcut_api
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    environment:
      NODE_ENV:     production
      PORT:         3001
      DATABASE_URL: postgres://freshcut:${DB_PASSWORD:-FreshCut@2568}@postgres:5432/freshcut_erp
      REDIS_URL:    redis://:${REDIS_PASSWORD:-Redis@2568}@redis:6379
      JWT_SECRET:   ${JWT_SECRET:-change_this_secret_in_production_min_32_chars}
      JWT_EXPIRES:  8h
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    ports:
      - "3001:3001"
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD","curl","-f","http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend (Nginx) ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001/api}
    container_name: freshcut_web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  # ── pgAdmin (optional, disable in production) ────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: freshcut_pgadmin
    restart: unless-stopped
    profiles: ["tools"]
    environment:
      PGADMIN_DEFAULT_EMAIL:    ${PGADMIN_EMAIL:-admin@freshcut.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-Admin@1234}
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
  uploads_data:
